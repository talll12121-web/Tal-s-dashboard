# Render blueprint - deploys the dashboard + a free Postgres database.
# In Render: New > Blueprint, point at this repo. Then set APP_PASSWORD and
# BRIDGE_TOKEN in the dashboard service's Environment tab (marked sync:false).
services:
  - type: web
    name: trading-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.wsgi:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: IB_ENABLED
        value: "false"            # cloud uses the desktop bridge, not a direct IBKR socket
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true       # stable session key
      - key: APP_PASSWORD
        sync: false               # set this yourself in the dashboard
      - key: BRIDGE_TOKEN
        sync: false               # set this yourself; reuse in bridge/.env
      - key: DATABASE_URL
        fromDatabase:
          name: trading-db
          property: connectionString

databases:
  - name: trading-db
    plan: free
